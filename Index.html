<!DOCTYPE html>
<html>
<head>
  <title>Untitled Military Thingy</title>
  <style>
    body {
      font-family: courier, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #111;
    }
    h1 {
      text-align: center;
      background: #333;
      color: white;
      padding: 15px 0;
      margin: 0;
      font-size: 32px;
      text-transform: uppercase;
    }
    /* Top category buttons */
    #categories {
      text-align: center;
      padding: 15px 0;
      background: #555;
    }
    #categories button {
      margin: 0 8px;
      padding: 8px 14px;
      font-size: 14px;
      color: white;
      background: #777;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }
    #categories button:hover {
      background: #999;
    }
    /* Search bar */
    #searchBar {
      display: block;
      margin: 15px auto;
      padding: 8px 10px;
      width: 90%;
      max-width: 500px;
      border-radius: 5px;
      border: 1px solid #aaa;
      font-size: 16px;
    }
    /* Vehicle cards */
    .vehicle {
      background: white;
      margin: 10px auto;
      padding: 10px 15px;
      width: 90%;
      max-width: 600px;
      border-left: 4px solid #333;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .vehicle p {
      margin: 0;
      font-weight: bold;
    }
    .vehicle button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .vehicle button:hover {
      background: #555;
    }
    /* Sections */
    section {
      padding: 20px 0;
    }
    section h2 {
      text-align: center;
      background: #222;
      color: white;
      padding: 8px 0;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<h1>Untitled Military Thingy</h1>

<div id="categories">
  <button onclick="scrollToSection('fighter')">Fighter Jets</button>
  <button onclick="scrollToSection('naval')">Naval</button>
  <button onclick="scrollToSection('artillery')">Artillery</button>
  <button onclick="scrollToSection('helicopter')">Helicopters</button>
  <button onclick="scrollToSection('ground')">Ground Vehicles</button>
  <button onclick="scrollToSection('armament')">Armament</button>
</div>

<input type="text" id="searchBar" placeholder="Search vehicle..." onkeyup="filterVehicles()">

<!-- Fighter Jets -->
<section id="fighter">
  <h2>Fighter Jets</h2>
  <div id="fighterList"></div>
</section>

<!-- Naval -->
<section id="naval">
  <h2>Naval Ships</h2>
  <div id="navalList"></div>
</section>

<!-- Artillery -->
<section id="artillery">
  <h2>Artillery</h2>
  <div id="artilleryList"></div>
</section>

<!-- Helicopters -->
<section id="helicopter">
  <h2>Helicopters</h2>
  <div id="helicopterList"></div>
</section>

<!-- Ground Vehicles -->
<section id="ground">
  <h2>Ground Vehicles</h2>
  <div id="groundList"></div>
</section>

<!-- Armament -->
<section id="armament">
  <h2>Armament</h2>
  <div id="armamentList"></div>
</section>

<script>
  // Smooth scroll function
  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({behavior: 'smooth'});
  }

  // Demo vehicle data
  const fighterJets = [
    {name: 'F-16 Fighting Falcon', desc: 'Single-engine multirole fighter', report:'F16.html'},
        {name: 'F-16 Fighting Falcon', desc: 'Single-engine multirole fighter:indonesia translate', report:'F16nesia.html'},
    {name: 'F/A-18 Hornet', desc: 'Twin-engine multirole fighter', report:'F18.html'},
    {name: 'F-22 Raptor', desc: 'Air superiority stealth fighter:Under Development', report:'F22.html'},
    {name: 'F-35 Lightning II', desc: 'File not ready yet', report:''}
  ];

  const navalShips = [
    {name: 'USS Nimitz (CVN-68)', desc: 'Aircraft carrier', report:'Uss Nimitz.html'},
    {name: 'USS Zumwalt (DDG-1000)', desc: 'Stealth destroyer', report:''},
    {name: 'HMS Queen Elizabeth', desc: 'Royal Navy carrier', report:''},
    {name: 'Kirov-class Battlecruiser', desc: 'File not ready yet', report:''}
  ];

  const artilleryList = [
    {name: 'M777 Howitzer', desc: '155mm towed howitzer', report:''},
    {name: 'PzH 2000', desc: 'German self-propelled artillery', report:''},
    {name: '2S19 Msta', desc: 'File not ready yet', report:''}
  ];

  const helicopterList = [
    {name: 'AH-64 Apache', desc: 'US attack helicopter', report:''},
    {name: 'UH-60 Black Hawk', desc: 'Transport helicopter', report:''},
    {name: 'Ka-50 Hokum', desc: 'File not ready yet', report:''}
  ];

  const groundList = [
    {name: 'M1 Abrams', desc: 'US main battle tank', report:''},
    {name: 'Leopard 2', desc: 'German main battle tank', report:''},
    {name: 'T-90', desc: 'File not ready yet', report:''}
  ];

  const armamentList = [
    {name: 'M61 Vulcan', desc: '20mm rotary cannon', report:''},
    {name: 'AIM-120 AMRAAM', desc: 'Medium-range air-to-air missile', report:''},
    {name: 'GBU-12 Paveway II', desc: 'File not ready yet', report:''}
  ];

  // Function to render vehicle list
  function renderVehicles(list, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    list.forEach(v => {
      const div = document.createElement('div');
      div.className = 'vehicle';
      const btn = v.report ? `<button onclick="location.href='${v.report}'">Report</button>` 
                           : `<button disabled>Report</button>`;
      div.innerHTML = `<p>${v.name}: ${v.desc}</p>${btn}`;
      container.appendChild(div);
    });
  }

  // Render all
  renderVehicles(fighterJets, 'fighterList');
  renderVehicles(navalShips, 'navalList');
  renderVehicles(artilleryList, 'artilleryList');
  renderVehicles(helicopterList, 'helicopterList');
  renderVehicles(groundList, 'groundList');
  renderVehicles(armamentList, 'armamentList');

  // Search filter
  function filterVehicles() {
    const term = document.getElementById('searchBar').value.toLowerCase();

    function filterList(list) {
      return list.filter(v => v.name.toLowerCase().includes(term) || v.desc.toLowerCase().includes(term));
    }

    renderVehicles(filterList(fighterJets), 'fighterList');
    renderVehicles(filterList(navalShips), 'navalList');
    renderVehicles(filterList(artilleryList), 'artilleryList');
    renderVehicles(filterList(helicopterList), 'helicopterList');
    renderVehicles(filterList(groundList), 'groundList');
    renderVehicles(filterList(armamentList), 'armamentList');
  }
</script>

</body>
</html>
